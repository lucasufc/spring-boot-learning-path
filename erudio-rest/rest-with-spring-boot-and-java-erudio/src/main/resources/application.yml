spring:
  application:
    name: rest-with-spring-boot-and-java-erudio

  datasource:
    url: jdbc:mysql://localhost:3306/erudio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: spring
    password: spring123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080